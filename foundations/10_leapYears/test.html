<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        /*
        Create a function that determines whether or not a given year is a leap year. 
        Leap years are determined by the following rules:

        Leap years are years divisible by four (like 1984 and 2004). 
        However, years divisible by 100 are not leap years (such as 1800 and 1900) 
        unless they are divisible by 400 (like 1600 and 2000, 
        which were in fact leap years). (Yes, it's all pretty confusing)
        leapYears(2000); // is a leap year: returns true
        leapYears(1985); // is not a leap year: returns false
        */


        function leapYears(year) {

            if ( (year % 4 === 0) && !(year % 100 === 0) ) {
                return true;
            } else if ( (year % 400 === 0) ) {
                return true;
            } else {
                return false;
            }

        }

        console.log(leapYears(1996));   // true
        console.log(leapYears(1997));   // false
        console.log(leapYears(34992));  // true
        console.log(leapYears(1900));   // false
        console.log(leapYears(1600));   // true
        console.log(leapYears(700));    // false


    </script>
    
</body>
</html>
